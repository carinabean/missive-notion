<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Missive Integration</title>
    <!-- Missive styles and script -->
    <link href="https://integrations.missiveapp.com/missive.css" rel="stylesheet">
    <script src="https://integrations.missiveapp.com/missive.js"></script>
    <style>
        body { padding: 16px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        /* Settings Form */
        #settings-view { display: none; }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; margin-bottom: 4px; font-weight: 500; font-size: 13px; }
        .input-group input, .input-group textarea { width: 100%; padding: 6px; border: 1px solid var(--missive-border-color, #e1e4e8); border-radius: 4px; box-sizing: border-box; }
        button { background: var(--missive-blue, #0366d6); color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: 500; }
        button:hover { opacity: 0.9; }
        
        /* Main App */
        #app-view { display: none; }
        .email-pill { display: inline-block; background: var(--missive-background-color-active, #f1f8ff); border: 1px solid var(--missive-blue, #0366d6); color: var(--missive-blue, #0366d6); padding: 4px 10px; border-radius: 16px; margin: 0 4px 8px 0; font-size: 12px; cursor: pointer; }
        .email-pill:hover { background: var(--missive-blue, #0366d6); color: white; }
        
        .page-link { display: block; padding: 8px; margin-bottom: 8px; background: var(--missive-background-color, #fff); border: 1px solid var(--missive-border-color, #e1e4e8); border-radius: 4px; text-decoration: none; color: inherit; }
        .page-link:hover { background: var(--missive-hover-background-color, #f6f8fa); }
        .title { font-weight: 600; margin-bottom: 4px; font-size: 14px; }
        
        #results { margin-top: 16px; }
        #emails-container { margin-bottom: 16px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .header h3 { margin: 0; font-size: 16px; }
        .btn-link { background: none; color: var(--missive-blue, #0366d6); padding: 0; font-size: 12px; font-weight: normal; }
        .btn-link:hover { text-decoration: underline; background: none; }
    </style>
</head>
<body>
    <div id="settings-view">
        <div class="header">
            <h3>Notion Settings</h3>
        </div>
        <p style="font-size: 12px; color: #586069; margin-bottom: 12px;">Your key is stored securely inside Missive and is never exposed in the code.</p>
        <div class="input-group">
            <label for="notion-key">Notion Internal Integration Secret</label>
            <input type="password" id="notion-key" placeholder="secret_...">
        </div>
        <div class="input-group">
            <label for="notion-dbs">Database IDs (comma separated)</label>
            <textarea id="notion-dbs" rows="3" placeholder="abc123def456, xyz987wvu654"></textarea>
        </div>
        <button id="save-settings">Save Settings</button>
    </div>

    <div id="app-view">
        <div class="header">
            <h3>Notion Search</h3>
            <button class="btn-link" id="edit-settings">Settings</button>
        </div>
        <div id="status" style="margin-bottom: 12px; font-size: 13px; color: #586069;">Select an email to view Notion links.</div>
        <div id="emails-container"></div>
        <div id="results"></div>
    </div>
    
    <script src="main.js"></script>
</body>
</html>
